# Shared acme.sh env. Used by both the one-shot issuer and the renewal daemon so `docker compose up` provisions/renews certs
x-acme-env: &acme-env
  - HEALTHCHECK=${HEALTHCHECK:-}
  - CF_Email=${CF_EMAIL}
  - CF_Key=${CF_KEY}
  - CF_Token=${CF_TOKEN}
  - CF_Account_ID=${CF_ACCOUNT_ID}
  - CF_Zone_ID=${CF_ZONE_ID}
  - DOMAIN=${DOMAIN}
  - DEPLOY_DOCKER_CONTAINER_LABEL=sh.acme.autoload.domain=${DOMAIN}
  - DEPLOY_DOCKER_CONTAINER_KEY_FILE=/opt/ssl/key-ecc.pem
  - DEPLOY_DOCKER_CONTAINER_CERT_FILE=/opt/ssl/cert-ecc.pem
  - DEPLOY_DOCKER_CONTAINER_CA_FILE=/opt/ssl/ca-ecc.pem
  - DEPLOY_DOCKER_CONTAINER_FULLCHAIN_FILE=/opt/ssl/fullchain-ecc.pem
  - DEPLOY_DOCKER_CONTAINER_RELOAD_CMD=cat /opt/ssl/key-ecc.pem /opt/ssl/fullchain-ecc.pem > /opt/ssl/fullchain-key.pem.ecdsa; sv restart haproxy 2>/dev/null; unbound-control reload 2>/dev/null; true

x-acme-volumes: &acme-volumes
  - ./run/acmeout:/acme.sh
  - /var/run/docker.sock:/var/run/docker.sock

volumes:
    dnscrypt:
    dnscrypt-server:
    ssl:
    nsd:
    acme-sh:
    acme-acc:
services:
  # set CA, issue the cert (acme.sh skips if still valid)
  acme:
    image: docker.io/neilpang/acme.sh
    container_name: acme
    restart: on-failure:2
    command:
      - /bin/sh
      - -ec
      - |
        acme.sh --set-default-ca --server letsencrypt || true
        if [ -n "$$HEALTHCHECK" ]; then
          acme.sh --issue --dns dns_cf --dnssleep 60 -d "$$DOMAIN" --keylength ec-384 \
            --renew-hook "curl -fsS -m 10 --retry 5 -o /dev/null https://hc-ping.com/$$HEALTHCHECK" || true
        else
          acme.sh --issue --dns dns_cf --dnssleep 60 -d "$$DOMAIN" --keylength ec-384 || true
        fi
        acme.sh --deploy -d "$$DOMAIN" --ecc --deploy-hook docker
        [ -n "$$HEALTHCHECK" ] && curl -fsS -m 10 --retry 5 -o /dev/null "https://hc-ping.com/$$HEALTHCHECK" || true
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    environment: *acme-env
    volumes: *acme-volumes

  # Renewal daemon: periodically renews and re-deploys certificates.
  acme-daemon:
    image: docker.io/neilpang/acme.sh
    container_name: acme-daemon
    restart: on-failure:5
    command: daemon
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    environment: *acme-env
    volumes: *acme-volumes

  nsd:
    container_name: nsd
    restart: on-failure:5
    build: nsd
    image: ghcr.io/publicarray/dns-resolver-infra/nsd
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    volumes:
      - nsd:/etc/nsd/run

  unbound:
    container_name: unbound
    restart: on-failure:5
    depends_on:
      - nsd
      - acme
    labels:
      - sh.acme.autoload.domain=${DOMAIN}
    build: unbound
    image: ghcr.io/publicarray/dns-resolver-infra/unbound
    command: -d nsd
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    ports:
      # DNS-over-QUIC (haproxy can't proxy DoQ)
      - "853:853/udp"
    volumes:
      # /opt/ssl = where acme.sh's docker deploy-hook writes the cert;
      # /etc/unbound/ssl = same volume inside unbound's chroot for reload.
      - ssl:/opt/ssl
      - ssl:/etc/unbound/ssl

  m13253-doh:
    container_name: doh
    restart: on-failure:5
    depends_on:
      - unbound
    build: m13253-doh
    image: ghcr.io/publicarray/dns-resolver-infra/m13253-doh
    command: -d unbound
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  # doh-proxy:
  #   container_name: doh-proxy
  #   restart: on-failure:5
  #   depends_on:
  #     - unbound
  #   build: doh-proxy
  #   image: ghcr.io/publicarray/dns-resolver-infra/doh-proxy
  #   command: -d

  haproxy:
    container_name: haproxy
    restart: on-failure:5
    stop_grace_period: 35s
    depends_on:
      - acme
      - m13253-doh
      - unbound
    labels:
      - sh.acme.autoload.domain=${DOMAIN}
    build: haproxy
    image: ghcr.io/publicarray/dns-resolver-infra/haproxy
    command: -d -r
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    ports:
      - "443:443/tcp"   # DoH
      - "443:443/udp"   # DoH3 (QUIC)
      - "853:853/tcp"   # DoT
      # 853/udp (DoQ) is served by unbound directly
    volumes:
       - ssl:/opt/ssl
    environment:
      - DOMAIN=${DOMAIN}

